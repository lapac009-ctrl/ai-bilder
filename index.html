<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #a8c0ff;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .main-wrapper {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Naslov kao sa tvoje slike */
        .header-text {
            font-size: 3rem;
            margin-bottom: 40px;
            font-weight: 300;
            transition: 0.5s ease;
        }

        .header-text span { color: #d1d5db; }
        .orange-star { color: #ff8c69; margin-right: 10px; }

        /* Chat prozor koji je na početku nevidljiv */
        #chat-window {
            width: 100%;
            height: 0;
            opacity: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            transition: all 0.5s ease;
            padding: 0 10px;
        }

        #chat-window.active {
            height: 300px;
            opacity: 1;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 0.95rem;
            line-height: 1.4;
            backdrop-filter: blur(10px);
        }

        .user-msg {
            align-self: flex-end;
            background: rgba(168, 192, 255, 0.1);
            border: 1px solid rgba(168, 192, 255, 0.2);
        }

        .ai-msg {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--border);
        }

        /* Input polje - Glassmorphism */
        .input-container {
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 18px 25px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.1rem;
            width: 100%;
            font-family: inherit;
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            color: #666;
            font-size: 0.85rem;
        }

        /* Dugmići (Chips) */
        .chips {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            transition: 0.3s;
        }

        .chip {
            background: transparent;
            border: 1px solid #333;
            color: #999;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .chip:hover { border-color: #555; color: white; }

        /* Sakrivanje naslova kada krene chat */
        .mini-header { font-size: 1.5rem !important; margin-bottom: 10px !important; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1 class="header-text" id="main-title"><span class="orange-star">✳</span>Evening, <span>bilider</span></h1>

        <div id="chat-window"></div>

        <div class="input-container">
            <input type="text" id="userInput" placeholder="Type / for skills" autocomplete="off">
            <div class="input-footer">
                <span>Sonnet 4.6</span>
                <span>|||</span>
            </div>
        </div>

        <div class="chips" id="chip-box">
            <button class="chip">Write</button>
            <button class="chip">Learn</button>
            <button class="chip">Code</button>
            <button class="chip">Life stuff</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chatWin = document.getElementById('chat-window');
        const title = document.getElementById('main-title');
        const chipBox = document.getElementById('chip-box');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user-msg' : 'ai-msg'}`;
            div.innerText = text;
            chatWin.appendChild(div);
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        function getAIResponse(text) {
            const val = text.toLowerCase();
            if(val.includes("zdravo")) return "Zdravo bilideru! Kako mogu da ti pomognem danas?";
            if(val.includes("ko si ti")) return "Ja sam tvoj personalizovani AI asistent.";
            if(val.includes("roblox")) return "Vidim da te zanima Roblox. Da li radimo na nekom novom Luau skriptu?";
            if(val.includes("mamba")) return "Mamba Roleplay projekat izgleda odlično, nastavi tako!";
            return "Razumem. Možeš li mi reći nešto više o tome?";
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const text = input.value;
                
                // Aktiviraj chat mod (promeni UI)
                chatWin.classList.add('active');
                title.classList.add('mini-header');
                chipBox.style.opacity = "0"; // Skloni dugmiće da ne smetaju

                // Dodaj poruku korisnika
                addMessage(text, true);
                input.value = "";

                // AI Odgovor
                setTimeout(() => {
                    const response = getAIResponse(text);
                    addMessage(response, false);
                }, 800);
            }
        });
    </script>
</body>
</html>
