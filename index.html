<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Real-time Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0d0d0d 100%);
        }

        .main-wrapper {
            width: 100%;
            max-width: 700px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header-text {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .orange-star { color: #ff8c69; margin-right: 12px; }

        #chat-window {
            height: 0;
            opacity: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            scrollbar-width: none;
            transition: 0.5s ease;
        }

        #chat-window.active { height: 400px; opacity: 1; }

        .msg {
            padding: 14px 20px;
            border-radius: 18px;
            max-width: 90%;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap; /* Ovo omogućava prikaz koda u redovima */
        }

        .user-msg {
            align-self: flex-end;
            background: rgba(168, 192, 255, 0.1);
            border: 1px solid rgba(168, 192, 255, 0.2);
            color: #d1e0ff;
        }

        .ai-msg {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--border);
            color: #ececec;
            font-family: 'Consolas', monospace; /* Za bolji prikaz koda */
        }

        .input-container {
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(25px);
            border-radius: 22px;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.15rem;
            width: 100%;
        }

        .loading { font-size: 0.8rem; color: #666; margin-top: 8px; display: none; }
        
        /* Skrivanje elemenata pri prelasku u chat */
        .chat-active .header-text { font-size: 1.5rem; margin-bottom: 15px; }
        .chat-active .chips { display: none; }
    </style>
</head>
<body id="body">

    <div class="main-wrapper" id="wrapper">
        <h1 class="header-text"><span class="orange-star">✳</span>Evening, <span>bilider</span></h1>

        <div id="chat-window"></div>

        <div class="input-container">
            <input type="text" id="userInput" placeholder="Pitaj me bilo šta (kod, savet, objašnjenje)..." autocomplete="off">
            <div id="loader" class="loading">Nexus AI razmišlja i piše kod...</div>
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chatWin = document.getElementById('chat-window');
        const wrapper = document.getElementById('wrapper');
        const loader = document.getElementById('loader');

        async function getRealAIResponse(prompt) {
            loader.style.display = "block";
            try {
                // Koristimo besplatan API koji simulira GPT modele
                const response = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(`https://api.simsimi.vn/v1/simtalk?text=${prompt}&lc=sr`));
                const data = await response.json();
                const result = JSON.parse(data.contents);
                loader.style.display = "none";
                return result.message || "Izvini, trenutno ne mogu da generišem odgovor.";
            } catch (err) {
                loader.style.display = "none";
                return "Došlo je do greške. Pokušaj ponovo za sekundu!";
            }
        }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user-msg' : 'ai-msg'}`;
            div.innerText = text;
            chatWin.appendChild(div);
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const text = input.value;
                
                wrapper.classList.add('chat-active');
                chatWin.classList.add('active');

                addMessage(text, true);
                input.value = "";

                // Ovde dobijamo odgovor od pravog AI servisa
                const aiResponse = await getRealAIResponse(text);
                addMessage(aiResponse, false);
            }
        });
    </script>
</body>
</html>
